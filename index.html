<!DOCTYPE html>
<html lang="it">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Bibletranslate - Traduzione Multilingue</title>
    <!-- Google Fonts per un typography moderna -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:opsz,wght@14..32,400;14..32,500;14..32,600;14..32,700&display=swap" rel="stylesheet">
    <!-- Font Awesome per icone (opzionale, per una grafica più ricca) -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css">
    <style>
        /* Reset e variabili CSS */
        :root {
            --primary-color: #1e3c5c;       /* blu profondo */
            --secondary-color: #2b5f8a;
            --accent-color: #e67e22;         /* arancio caldo */
            --light-bg: #f4f7fb;
            --card-bg: #ffffff;
            --text-dark: #2c3e50;
            --text-light: #6c7a8d;
            --shadow-sm: 0 4px 12px rgba(0, 0, 0, 0.08);
            --shadow-md: 0 8px 24px rgba(0, 0, 0, 0.12);
            --border-radius: 16px;
            --transition: all 0.25s ease;
        }
        
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Inter', sans-serif;
            background-color: var(--light-bg);
            color: var(--text-dark);
            line-height: 1.5;
            display: flex;
            flex-direction: column;
            min-height: 100vh;
        }

        /* Header */
        header {
            background-color: var(--primary-color);
            color: white;
            padding: 0.8rem 0;
            box-shadow: var(--shadow-sm);
            position: sticky;
            top: 0;
            z-index: 10;
        }

        .container {
            width: 90%;
            max-width: 1200px;
            margin: 0 auto;
        }

        .header-content {
            display: flex;
            align-items: center;
            justify-content: space-between;
        }

        .logo {
            display: flex;
            align-items: center;
            gap: 1rem;
        }

        .logo-image {
            height: 48px;
            width: auto;
            border-radius: 8px;
            transition: var(--transition);
        }

        .logo-image:hover {
            transform: scale(1.05);
        }

        .logo-text {
            font-size: 1.6rem;
            font-weight: 700;
            letter-spacing: -0.5px;
            color: white;
        }

        /* Hero section semplificata – integrata nel titolo principale */
        .page-title {
            text-align: center;
            margin: 2rem 0 1rem;
        }

        .page-title h1 {
            font-size: 2.5rem;
            font-weight: 700;
            color: var(--primary-color);
        }

        .page-title p {
            color: var(--text-light);
            font-size: 1.1rem;
            margin-top: 0.5rem;
        }

        /* Sezione traduzione */
        .translation-section {
            flex: 1;
            padding: 1rem 0 3rem;
        }

        .translation-card {
            background-color: var(--card-bg);
            border-radius: var(--border-radius);
            box-shadow: var(--shadow-md);
            max-width: 900px;
            margin: 0 auto;
            padding: 2rem 2rem 2.5rem;
        }

        .search-wrapper {
            margin-bottom: 1.8rem;
        }

        .search-box {
            display: flex;
            align-items: center;
            background: #f1f5f9;
            border-radius: 60px;
            padding: 0.5rem 1.2rem;
            border: 1px solid #e2e8f0;
            transition: var(--transition);
        }

        .search-box:focus-within {
            border-color: var(--accent-color);
            box-shadow: 0 0 0 3px rgba(230, 126, 34, 0.2);
        }

        .search-box i {
            color: var(--text-light);
            font-size: 1.1rem;
            margin-right: 0.8rem;
        }

        .search-box input {
            width: 100%;
            border: none;
            background: transparent;
            font-size: 1rem;
            padding: 0.6rem 0;
            outline: none;
            font-family: 'Inter', sans-serif;
        }

        .search-box input::placeholder {
            color: #a0b3c9;
        }

        .language-list-title {
            display: flex;
            justify-content: space-between;
            align-items: baseline;
            margin-bottom: 1rem;
            flex-wrap: wrap;
        }

        .language-list-title h3 {
            font-weight: 600;
            color: var(--primary-color);
        }

        .language-count {
            background: #e9edf2;
            padding: 0.3rem 0.8rem;
            border-radius: 40px;
            font-size: 0.9rem;
            font-weight: 500;
            color: var(--text-dark);
        }

        .scroll-box {
            max-height: 380px;
            overflow-y: auto;
            border-radius: 12px;
            border: 1px solid #edf2f7;
            background: #f9fcff;
            padding: 0.5rem;
            margin-bottom: 2rem;
            scrollbar-width: thin;
            scrollbar-color: var(--secondary-color) #e2e8f0;
        }

        .scroll-box::-webkit-scrollbar {
            width: 8px;
        }

        .scroll-box::-webkit-scrollbar-track {
            background: #e2e8f0;
            border-radius: 8px;
        }

        .scroll-box::-webkit-scrollbar-thumb {
            background-color: var(--secondary-color);
            border-radius: 8px;
        }

        .lang-btn {
            background-color: white;
            border: 1px solid #e2e8f0;
            padding: 1rem 1.2rem;
            margin: 0.4rem 0;
            width: 100%;
            border-radius: 12px;
            cursor: pointer;
            font-size: 1.05rem;
            font-weight: 500;
            text-align: left;
            display: flex;
            align-items: center;
            gap: 12px;
            transition: var(--transition);
            color: var(--text-dark);
            box-shadow: 0 2px 5px rgba(0,0,0,0.02);
        }

        .lang-btn i {
            color: var(--accent-color);
            width: 24px;
            font-size: 1.2rem;
            transition: var(--transition);
        }

        .lang-btn:hover {
            background-color: var(--primary-color);
            color: white;
            border-color: var(--primary-color);
            transform: translateY(-2px);
            box-shadow: 0 8px 16px rgba(0,0,0,0.1);
        }

        .lang-btn:hover i {
            color: white;
        }

        .lang-btn.hidden {
            display: none;
        }

        /* Area di visualizzazione testo e audio */
        .output-area {
            background: #f1f5f9;
            border-radius: 16px;
            padding: 1.8rem;
            margin-top: 1.5rem;
            border: 1px solid #e2e8f0;
        }

        #textBox {
            font-size: 1.15rem;
            line-height: 1.7;
            white-space: pre-wrap;
            background: white;
            padding: 1.5rem;
            border-radius: 12px;
            box-shadow: inset 0 2px 6px rgba(0,0,0,0.02);
            border: 1px solid #e9eef3;
            min-height: 140px;
            color: #1e293b;
        }

        .audio-wrapper {
            margin-top: 1.5rem;
            display: flex;
            align-items: center;
            gap: 1rem;
            flex-wrap: wrap;
        }

        #audioPlayer {
            flex: 1;
            min-width: 240px;
            height: 44px;
            border-radius: 30px;
        }

        .copy-btn {
            background-color: white;
            border: 1px solid var(--secondary-color);
            color: var(--secondary-color);
            padding: 0.7rem 1.5rem;
            border-radius: 40px;
            font-weight: 600;
            font-size: 0.95rem;
            cursor: pointer;
            transition: var(--transition);
            display: inline-flex;
            align-items: center;
            gap: 8px;
        }

        .copy-btn:hover {
            background-color: var(--secondary-color);
            color: white;
        }

        /* Footer */
        footer {
            background-color: var(--primary-color);
            color: #d0ddee;
            text-align: center;
            padding: 1.5rem 0;
            margin-top: 2rem;
        }

        footer a {
            color: white;
            text-decoration: none;
            font-weight: 500;
        }

        footer a:hover {
            text-decoration: underline;
        }

        /* Responsive */
        @media (max-width: 640px) {
            .logo-text {
                font-size: 1.2rem;
            }
            .logo-image {
                height: 40px;
            }
            .page-title h1 {
                font-size: 2rem;
            }
            .translation-card {
                padding: 1.5rem;
            }
            .audio-wrapper {
                flex-direction: column;
                align-items: stretch;
            }
            .copy-btn {
                justify-content: center;
            }
        }
    </style>
</head>
<body>
    <header>
        <div class="container">
            <div class="header-content">
                <div class="logo">
                    <img src="https://static.wixstatic.com/media/aaab41_246ad2f755ef43baabe95b3c70a82adf~mv2.png" alt="Logo Bibletranslate" class="logo-image">
                    <span class="logo-text">Bibletranslate</span>
                </div>
                <!-- Possiamo aggiungere un link o icona profilo in futuro -->
            </div>
        </div>
    </header>

    <main>
        <div class="container">
            <div class="page-title">
                <h1>🌍 Traduci in ogni lingua</h1>
                <p>Seleziona una lingua per leggere e ascoltare il messaggio</p>
            </div>

            <section class="translation-section">
                <div class="translation-card">
                    <!-- Barra di ricerca -->
                    <div class="search-wrapper">
                        <div class="search-box">
                            <i class="fas fa-search"></i>
                            <input type="text" id="languageSearch" placeholder="Cerca lingua (es. Italiano, Inglese...)" autocomplete="off">
                        </div>
                    </div>

                    <div class="language-list-title">
                        <h3><i class="fas fa-language" style="margin-right: 8px; color: var(--accent-color);"></i>Lingue disponibili</h3>
                        <span class="language-count" id="langCount">41 lingue</span>
                    </div>

                    <div class="scroll-box" id="languageScrollBox">
                        <!-- I pulsanti verranno generati qui? No, li abbiamo già statici. 
                             Ma per il filtro useremo JS. Manteniamo i pulsanti statici con i loro attributi -->
                        <button class="lang-btn" onclick="playLanguage('italiano')" data-language="italiano"><i class="fas fa-flag"></i> Italiano</button>
                        <button class="lang-btn" onclick="playLanguage('albanese')" data-language="albanese"><i class="fas fa-flag"></i> Albanese</button>
                        <button class="lang-btn" onclick="playLanguage('arabo')" data-language="arabo"><i class="fas fa-flag"></i> Arabo</button>
                        <button class="lang-btn" onclick="playLanguage('bengalese')" data-language="bengalese"><i class="fas fa-flag"></i> Bengalese</button>
                        <button class="lang-btn" onclick="playLanguage('bulgaro')" data-language="bulgaro"><i class="fas fa-flag"></i> Bulgaro</button>
                        <button class="lang-btn" onclick="playLanguage('ceco')" data-language="ceco"><i class="fas fa-flag"></i> Ceco</button>
                        <button class="lang-btn" onclick="playLanguage('cinese')" data-language="cinese"><i class="fas fa-flag"></i> Cinese</button>
                        <button class="lang-btn" onclick="playLanguage('croato')" data-language="croato"><i class="fas fa-flag"></i> Croato</button>
                        <button class="lang-btn" onclick="playLanguage('danese')" data-language="danese"><i class="fas fa-flag"></i> Danese</button>
                        <button class="lang-btn" onclick="playLanguage('estone')" data-language="estone"><i class="fas fa-flag"></i> Estone</button>
                        <button class="lang-btn" onclick="playLanguage('finlandese')" data-language="finlandese"><i class="fas fa-flag"></i> Finlandese</button>
                        <button class="lang-btn" onclick="playLanguage('francese')" data-language="francese"><i class="fas fa-flag"></i> Francese</button>
                        <button class="lang-btn" onclick="playLanguage('giapponese')" data-language="giapponese"><i class="fas fa-flag"></i> Giapponese</button>
                        <button class="lang-btn" onclick="playLanguage('greco')" data-language="greco"><i class="fas fa-flag"></i> Greco</button>
                        <button class="lang-btn" onclick="playLanguage('hindi')" data-language="hindi"><i class="fas fa-flag"></i> Hindi</button>
                        <button class="lang-btn" onclick="playLanguage('inglese')" data-language="inglese"><i class="fas fa-flag"></i> Inglese</button>
                        <button class="lang-btn" onclick="playLanguage('lituano')" data-language="lituano"><i class="fas fa-flag"></i> Lituano</button>                  
                        <button class="lang-btn" onclick="playLanguage('malayalam')" data-language="malayalam"><i class="fas fa-flag"></i> Malayalam</button>
                        <button class="lang-btn" onclick="playLanguage('norvegese')" data-language="norvegese"><i class="fas fa-flag"></i> Norvegese</button>
                        <button class="lang-btn" onclick="playLanguage('olandese')" data-language="olandese"><i class="fas fa-flag"></i> Olandese</button>
                        <button class="lang-btn" onclick="playLanguage('pashto')" data-language="pashto"><i class="fas fa-flag"></i> Pashto</button>
                        <button class="lang-btn" onclick="playLanguage('persiano')" data-language="persiano"><i class="fas fa-flag"></i> Persiano</button>
                        <button class="lang-btn" onclick="playLanguage('polacco')" data-language="polacco"><i class="fas fa-flag"></i> Polacco</button>
                        <button class="lang-btn" onclick="playLanguage('portoghese')" data-language="portoghese"><i class="fas fa-flag"></i> Portoghese</button>
                        <button class="lang-btn" onclick="playLanguage('pidgin')" data-language="pidgin"><i class="fas fa-flag"></i> Pidgin</button>
                        <button class="lang-btn" onclick="playLanguage('punjabi')" data-language="punjabi"><i class="fas fa-flag"></i> Punjabi</button>
                        <button class="lang-btn" onclick="playLanguage('rumeno')" data-language="rumeno"><i class="fas fa-flag"></i> Rumeno</button>
                        <button class="lang-btn" onclick="playLanguage('russo')" data-language="russo"><i class="fas fa-flag"></i> Russo</button>
                        <button class="lang-btn" onclick="playLanguage('spagnolo')" data-language="spagnolo"><i class="fas fa-flag"></i> Spagnolo</button>
                        <button class="lang-btn" onclick="playLanguage('svedese')" data-language="svedese"><i class="fas fa-flag"></i> Svedese</button>
                        <button class="lang-btn" onclick="playLanguage('tagalog')" data-language="tagalog"><i class="fas fa-flag"></i> Tagalog</button>
                        <button class="lang-btn" onclick="playLanguage('tedesco')" data-language="tedesco"><i class="fas fa-flag"></i> Tedesco</button>
                        <button class="lang-btn" onclick="playLanguage('turco')" data-language="turco"><i class="fas fa-flag"></i> Turco</button>
                        <button class="lang-btn" onclick="playLanguage('ungherese')" data-language="ungherese"><i class="fas fa-flag"></i> Ungherese</button>
                        <button class="lang-btn" onclick="playLanguage('urdu')" data-language="urdu"><i class="fas fa-flag"></i> Urdu</button>

                    </div>

                    <!-- Area di output: testo e audio -->
                    <div class="output-area">
                        <div id="textBox">👈 Seleziona una lingua per vedere il testo</div>
                        <div class="audio-wrapper">
                            <audio id="audioPlayer" controls style="display: none;"></audio>
                            <button class="copy-btn" id="copyTextBtn"><i class="far fa-copy"></i> Copia testo</button>

                    </div>
                </div>
            </section>
        </div>
    </main>

    <footer>
        <div class="container">
            <p>Bibletranslate — Messaggio in oltre 40 lingue | <a href="#">jw.org</a></p>
            <p style="font-size: 0.9rem; margin-top: 0.5rem;">Condividi il messaggio con chiunque, nella sua lingua ❤️</p>
        </div>
    </footer>

    <script>
        // Testi e link audio (identici all'originale, ma ho aggiunto qualche correzione minore)
        const texts = {
            italiano: `Buongiorno. Posso farle una domanda? Conosce il sito web più tradotto al mondo? 
E il sito JW.ORG gratuito e tradotto in più di 1000 lingue. 
Contiene argomenti e video utili per tutte le persone.

            albanese: `Mirëmëngjes. A mund të të bëj një pyetje? A e dini se cila është faqja e internetit më e përkthyer në botë?

Nëse dëshironi, mund të merrni biletën.

            arabo: `صباح الخير. هل يمكنني أن أسألك سؤالا؟ هل تعرف الموقع الأكثر ترجمة في العالم؟

يحتوي على مواضيع وفيديوهات مفيدة لجميع الأشخاص.
إذا كنت ترغب في ذلك، يمكنك أخذ التذكرة.
شكرًا لكم على اهتمامكم. يوم جيد.`,

            bengalese: `সুপ্রভাত। আমি কি তোমাকে একটা প্রশ্ন করতে পারি? আপনি কি বিশ্বের সবচেয়ে বেশি অনুবাদিত ওয়েবসাইট জানেন?
আর বিনামূল্যের JW.ORG ওয়েবসাইটটি ১০০০ টিরও বেশি ভাষায় অনুবাদ করা হয়েছে।
সকল মানুষের জন্য দরকারী বিষয় এবং ভিডিও রয়েছে।
তুমি চাইলে টিকিট নিতে পারো।
আপনার মনোযোগের জন্য ধন্যবাদ। শুভ দিন.`,

            bulgaro: `Добро утро. Мога ли да ви задам един въпрос? Знаете ли кой е най-превежданият уебсайт в света?
А безплатният уебсайт JW.ORG е преведен на повече от 1000 езика.
Съдържа полезни теми и видеоклипове за всички хора.
Ако желаете, можете да вземете билета.
Благодаря ви за вниманието. Добър ден.`,

            ceco: `Dobré ráno. Můžu se vás na něco zeptat? Znáte nejpřekládanější webovou stránku na světě?
A bezplatné webové stránky JW.ORG jsou přeloženy do více než 1000 jazyků.
Obsahuje užitečná témata a videa pro všechny.
Pokud chcete, můžete si vzít lístek.
Děkuji za vaši pozornost. Dobrý den.`,

            cinese: `早安.我可以問你一個問題嗎？你知道世界上翻譯次數最多的網站嗎？
免費的 JW.ORG 網站已翻譯成 1000 多種語言。

如果你願意的話，你可以拿這張票。
感謝您的關注。再會.`,

            croato: `Dobro jutro. Mogu li vam postaviti pitanje? Znate li koja je najprevođenija web stranica na svijetu?

            danese: `Godmorgen. Må jeg stille dig et spørgsmål? Kender du den mest oversatte hjemmeside i verden?

            finlandese: `Hyvää huomenta. Voinko kysyä sinulta kysymyksen? Tiedätkö maailman käännetyimmän verkkosivuston?

            francese: `Bonjour. Puis-je te poser une question ? Connaissez-vous le site Web le plus traduit au monde ?

            giapponese: `おはよう。質問してもよろしいでしょうか？世界で最も翻訳されているウェブサイトをご存知ですか?

            greco: `Καλημέρα. Μπορώ να σας κάνω μια ερώτηση; Γνωρίζετε την πιο μεταφρασμένη ιστοσελίδα στον κόσμο;
Και ο δωρεάν ιστότοπος JW.ORG είναι μεταφρασμένος σε περισσότερες από 1000 γλώσσες.

            hindi: `शुभ प्रभात। क्या मुझे आपसे एक सवाल पूछने की अनुमति है? क्या आप जानते हैं कि दुनिया में सबसे अधिक अनुवादित वेबसाइट कौन सी है?

        // Funzione principale per la riproduzione
        function playLanguage(lang) {
            const textBox = document.getElementById('textBox');
            const audio = document.getElementById('audioPlayer');
            
            if (texts[lang]) {
                textBox.innerText = texts[lang];
                
                if (audioLinks[lang]) {
                    audio.src = audioLinks[lang];
                    audio.style.display = 'block';
                    audio.load();
                    audio.play().catch(error => {
                        console.error('Errore riproduzione:', error);
                        // Se il browser blocca autoplay, l'utente premerà play manualmente
                    });
                } else {
                    console.error('Audio non trovato per:', lang);
                    audio.style.display = 'none';
                }
            } else {
                textBox.innerText = "Testo non disponibile per questa lingua.";
                audio.style.display = 'none';
            }
        }

        // Funzione per filtrare le lingue
        function filterLanguages() {
            const searchInput = document.getElementById('languageSearch').value.toLowerCase().trim();
            const buttons = document.querySelectorAll('.lang-btn');
            let visibleCount = 0;

            buttons.forEach(btn => {
                const langName = btn.textContent.toLowerCase().replace(/[🪧🔊]/, '').trim(); // pulizia icone
                if (langName.includes(searchInput) || searchInput === '') {
                    btn.classList.remove('hidden');
                    visibleCount++;
                } else {
                    btn.classList.add('hidden');
                }
            });

            // Aggiorna contatore
            const countSpan = document.getElementById('langCount');
            if (countSpan) {
                countSpan.textContent = visibleCount + ' lingua' + (visibleCount !== 1 ? 'e' : '');
            }
        }

        // Copia testo negli appunti
        function copyText() {
            const textBox = document.getElementById('textBox');
            const text = textBox.innerText;
            if (text && text !== "👈 Seleziona una lingua per vedere il testo") {
                navigator.clipboard.writeText(text).then(() => {
                    alert('Testo copiato negli appunti!');
                }).catch(err => {
                    console.error('Errore nella copia: ', err);
                });
            } else {
                alert('Nessun testo da copiare. Seleziona prima una lingua.');
            }
        }

        // Event listener per il filtro
        document.addEventListener('DOMContentLoaded', function() {
            const searchInput = document.getElementById('languageSearch');
            if (searchInput) {
                searchInput.addEventListener('input', filterLanguages);
            }

            // Pulsante copia
            const copyBtn = document.getElementById('copyTextBtn');
            if (copyBtn) {
                copyBtn.addEventListener('click', copyText);
            }

            // Inizializza contatore
            filterLanguages();
        });
